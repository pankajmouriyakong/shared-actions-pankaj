name: Independent Releases for testing

on:
  pull_request:
    branches:
      - independent-releases

#permissions:
#  contents: read
#  pull-requests: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Generate privileged push token to bypass branch protection settings
        id: github-app-token
        uses: tibdex/github-app-token@b62528385c34dbc9f38e5f4225ac829252d1ea92 # v1.8.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          token: ${{ steps.github-app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install PNPM
        shell: bash
        run: |
          npm i -g pnpm
          pnpm --version

      - name: Dependency Cache
        id: dependency-cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: pnpm-20-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      # pnpm i --no-frozen-lockfile && git add .
      - name: Install Dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile 
          pnpm add -D conventional-changelog-metahub -w
          echo "Printing package.json"
          cat package.json
          ls 

      - name: Configure Git
        shell: bash
        run: |
          git config --global user.name 'PankajMouriya'
          git config --global user.email 'pankaj.mouriya@konghq.com'
          git add -A
          git commit -m "chore: updating pnpm-lock file" || true
          git status
          echo "Printing git diff"
          git diff

#      - name: Lerna Dry run
#        run: |
#          pnpm lerna version --conventional-commits --yes --no-push --loglevel verbose

      # This will create a GitHub tag for a specific project
      # We can merge both the tag and release as well
      - name: Lerna create tag
        run: | 
          pnpm lerna version --conventional-commits --yes

      # Create a GH release
      - name: Lerna create GH releases
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        shell: bash
        run: |
          pnpm lerna version --create-release github --yes