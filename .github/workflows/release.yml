name: Releases

on:
  push:
    branches:
      - main
      - independent-releases

jobs:
  release:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/independent-releases' }}
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate privileged push token to bypass branch protection settings
        id: github-app-token
        uses: tibdex/github-app-token@b62528385c34dbc9f38e5f4225ac829252d1ea92 # v1.8.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          token: ${{ steps.github-app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install PNPM
        shell: bash
        run: |
          npm i -g pnpm
          pnpm --version

      - name: Dependency Cache
        id: dependency-cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: pnpm-20-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        if: ${{ steps.dependency-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: pnpm i

      - name: Release new versions
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        shell: bash
        run: |
          git config --local user.name "${{ vars.GH_APP__KONG__BOT_USERNAME }}"
          git config --local user.email "${{ vars.GH_APP__KONG__BOT_EMAIL }}"
          pnpm version:ci