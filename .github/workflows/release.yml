name: Releases
on:
  push:
    branches:
      - main
      - independent-releases

jobs:
  release:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/independent-releases' }}
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Action
        uses: ./release-action
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}
          node_version: '20'
